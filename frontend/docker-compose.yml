services:
  frontend:
    build:
      context: .
    container_name: verifyai-frontend
    restart: unless-stopped
    environment:
      VITE_API_TARGET: http://backend:8000
    ports:
      - "5174:5173"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  frontend_node_modules:
